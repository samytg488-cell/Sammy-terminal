<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMMY SUPREME ONLINE</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #010204; color: #d1d5db; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; border-bottom: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; }
        #chart { flex: 1; width: 100%; }
        .controls { padding: 20px; background: #0a0c10; display: flex; gap: 10px; align-items: center; }
        .btn { padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .buy { background: #10b981; } .sell { background: #f43f5e; }
        #feed { height: 100px; overflow-y: auto; background: #000; padding: 10px; font-size: 11px; color: #6b7280; }
        #status { font-size: 10px; color: #fbbf24; }
    </style>
</head>
<body>

<header>
    <div>
        <b style="color:#38bdf8; font-size:20px;">SAMMY_ONLINE_V15</b>
        <div id="status">CONNECTING...</div>
    </div>
    <div id="priceDisplay" style="font-size:30px; font-weight:bold;">$0.00</div>
</header>

<div id="chart"></div>

<div id="feed">--- GLOBAL TRADE FEED ---</div>

<div class="controls">
    <input type="number" id="lots" value="1000" style="padding:10px; background:#000; color:#10b981; border:1px solid #1c1f26;">
    <button class="btn buy" onclick="sendTrade('BUY')">BUY</button>
    <button class="btn sell" onclick="sendTrade('SELL')">SELL</button>
    <div id="pnl" style="margin-left: 20px; font-size: 20px;">PNL: $0.00</div>
</div>

<script>
    // Hosting ke baad yahan apna Render link daalein
    const socket = io("http://localhost:3000"); 

    let currentPrice = 0;
    let myPosition = null;

    socket.on('connect', () => {
        document.getElementById('status').innerText = "SYSTEM_ONLINE";
        document.getElementById('status').style.color = "#10b981";
    });

    socket.on('tick', (data) => {
        currentPrice = data.price;
        document.getElementById('priceDisplay').innerText = "$" + currentPrice.toFixed(2);
        updateChart(data);
        calculatePNL();
    });

    socket.on('broadcast_trade', (data) => {
        const feed = document.getElementById('feed');
        const color = data.side === 'BUY' ? '#10b981' : '#f43f5e';
        feed.innerHTML = `<div style="color:${color}">[${data.user}] ${data.side} at ${data.px}</div>` + feed.innerHTML;
    });

    function sendTrade(side) {
        const amount = document.getElementById('lots').value;
        myPosition = { side, entry: currentPrice, amount };
        socket.emit('trade', { side, amount });
    }

    function calculatePNL() {
        if (!myPosition) return;
        let diff = currentPrice - myPosition.entry;
        let pnl = myPosition.side === 'BUY' ? diff * myPosition.amount : -diff * myPosition.amount;
        const pnlUI = document.getElementById('pnl');
        pnlUI.innerText = "PNL: $" + pnl.toFixed(2);
        pnlUI.style.color = pnl >= 0 ? "#10b981" : "#f43f5e";
    }

    function updateChart(data) {
        const trace = { x: [new Date(data.time)], y: [data.price], type: 'scatter', line: {color: '#38bdf8'} };
        const layout = { paper_bgcolor: '#010204', plot_bgcolor: '#010204', margin: {t:20, b:20, l:40, r:20}, font: {color: '#444'} };
        Plotly.extendTraces('chart', {x: [[new Date(data.time)]], y: [[data.price]]}, [0]);
    }

    // Initialize Chart
    Plotly.newPlot('chart', [{x: [], y: [], type: 'scatter'}], { paper_bgcolor: '#010204', plot_bgcolor: '#010204' });
</script>

</body>
</html>
