<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SAMMY SUPREME v15.0 - MULTIPLAYER LIVE</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg: #010204; --panel: #0a0c10; --border: #1c1f26;
    --text: #d1d5db; --accent: #38bdf8; --green: #10b981; --red: #f43f5e; --gold: #fbbf24;
  }
  body, html { margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:var(--text); font-family: 'JetBrains Mono', 'Fira Code', monospace; overflow:hidden; }
  .supreme-container { display:grid; grid-template-columns: 320px 1fr 340px; grid-template-rows: 75px 1fr 220px; height:100vh; gap:8px; padding:8px; }
  
  header { grid-column: 1 / -1; display:flex; align-items:center; justify-content:space-between; padding:0 30px; background:var(--panel); border:1px solid var(--border); border-radius:12px; border-bottom: 2px solid var(--accent); }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:15px; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  
  .tf-module { position:absolute; top:12px; left:12px; z-index:1000; display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.95); padding:8px 12px; border-radius:8px; border:1px solid var(--accent); }
  .tf-btn { background:#161b22; border:1px solid var(--border); color:var(--text); padding:5px 10px; cursor:pointer; border-radius:4px; font-size:10px; transition: 0.2s; }
  .tf-btn.active { background:var(--accent); color:#000; font-weight:900; }
  .timer-display { font-size:14px; font-weight:900; color:var(--gold); border-left:2px solid var(--border); padding-left:10px; margin-left:5px; }

  .bot-matrix { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .stat-item { background:rgba(255,255,255,0.02); padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); }
  .stat-label { font-size:9px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-size:18px; font-weight:900; display:block; margin-top:4px; }
  
  .exec-box { display: flex; flex-direction: column; gap: 10px; }
  input, select { background:#000; border:1px solid var(--border); color:var(--green); padding:10px; border-radius:6px; font-size:14px; font-weight:bold; outline: none; }
  .btn-wrap { display:flex; gap:10px; }
  .btn { flex:1; border:none; padding:15px; border-radius:8px; cursor:pointer; font-weight:900; text-transform:uppercase; color:#fff; transition: 0.2s; }
  .buy { background: linear-gradient(135deg, #065f46, #10b981); }
  .sell { background: linear-gradient(135deg, #991b1b, #f43f5e); }
  .exit-btn { background: #30363d; display: none; width: 100%; border: 1px solid #444; }

  #logs { font-size:10px; color:#6b7280; overflow-y:auto; flex:1; margin-top:15px; line-height:1.6; }
  .resting-list { margin-top: 15px; font-size: 10px; max-height: 100px; overflow-y: auto; }
  .order-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1c1f26; color: var(--gold); }
  .online-status { font-size:10px; color:var(--green); background:rgba(16,185,129,0.1); padding:4px 12px; border-radius:20px; border:1px solid var(--green); }
</style>
</head>
<body>

<div class="supreme-container">
  <header>
    <div style="display:flex; align-items:center; gap:25px;">
      <span style="font-size:24px; font-weight:900; color:var(--accent); letter-spacing:-1px;">SAMMY_LIVE_v15</span>
      <div id="status" class="online-status">CONNECTING...</div>
    </div>
    <div style="display:flex; gap:60px;">
      <div class="stat"><div class="stat-label">Global Price</div><div id="priceUI" style="font-size:28px; font-weight:900;">$0.00</div></div>
      <div class="stat"><div class="stat-label">Liquidity Pool</div><div id="poolUI" style="font-size:22px; font-weight:bold; color:var(--gold)">$5,000,000</div></div>
    </div>
  </header>

  <aside class="panel">
    <div style="font-weight:900; color:var(--accent); margin-bottom:15px; border-left:3px solid var(--accent); padding-left:10px;">GLOBAL TRADER FEED</div>
    <div class="bot-matrix">
      <div class="stat-item"><span class="stat-label">Active Users</span><span class="stat-value" id="actBots" style="color:var(--green)">0</span></div>
      <div class="stat-item"><span class="stat-label">System IQ</span><span class="stat-value">210.5</span></div>
    </div>
    <div style="margin-top:20px; font-weight:bold; font-size:10px; color:var(--accent);">PENDING LIMITS</div>
    <div id="pendingList" class="resting-list"></div>
    <div id="logs"></div>
  </aside>

  <main class="panel" style="padding:0;">
    <div class="tf-module">
      <button class="tf-btn active">1m</button>
      <div class="timer-display" id="timer">00:00</div>
    </div>
    <div id="chart" style="height:100%;"></div>
  </main>

  <aside class="panel">
    <div style="font-weight:900; color:var(--accent); margin-bottom:10px;">INSTITUTIONAL EXECUTION</div>
    <div class="exec-box">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <div>
          <label style="font-size:9px; color:var(--accent)">TYPE</label>
          <select id="orderType" style="width:100%;" onchange="toggleLimit()">
            <option value="market">MARKET</option>
            <option value="limit">LIMIT</option>
          </select>
        </div>
        <div>
          <label style="font-size:9px; color:var(--accent)">LOTS</label>
          <input type="number" id="lotInput" value="5000" style="width:100%;">
        </div>
      </div>
      <div id="limitBox" style="display:none;">
        <label style="font-size:9px; color:var(--gold);">LIMIT TRIGGER</label>
        <input type="number" id="limitPrice" step="0.01" style="width:100%; border-color:var(--gold); color:var(--gold);">
      </div>
      <div class="btn-wrap">
        <button class="btn buy" id="buyBtn">PUNCH BUY</button>
        <button class="btn sell" id="sellBtn">PUNCH SELL</button>
      </div>
      <button class="btn exit-btn" id="exitBtn" onclick="manualExit()">MANUAL EXIT</button>
      <div id="pnlUI" style="margin-top:15px; font-size:32px; font-weight:900; text-align:center; padding:15px; background:rgba(0,0,0,0.5); border-radius:10px; border:1px solid var(--border);">PNL: $0.00</div>
    </div>
  </aside>
</div>

<script>
  const socket = io("https://sammy-terminal.onrender.com");
  let price = 100.00, serverHistory = [];
  let pos = {side: null, entry: 0, size: 0};
  let resting = [];

  socket.on('connect', () => {
    document.getElementById('status').innerText = "LIVE_SERVER_CONNECTED";
    log("CONNECTED TO GLOBAL ENGINE", "var(--green)");
  });

  // 1. Sync History when joining
  socket.on('initData', (data) => {
    serverHistory = data;
    renderUI();
  });

  // 2. Real-time Market Update (Price + Users + History)
  socket.on('marketUpdate', (data) => {
    price = data.price;
    serverHistory = data.history; // Get exact same candles as server
    document.getElementById('actBots').innerText = data.activeUsers;
    checkLimitOrders();
    renderUI();
  });

  socket.on('userCountUpdate', (count) => {
    document.getElementById('actBots').innerText = count;
  });

  socket.on('orderLog', (data) => {
    const l = document.getElementById('logs');
    l.innerHTML = `<div style="color:${data.color}">[${new Date().toLocaleTimeString()}] ${data.msg}</div>` + l.innerHTML;
  });

  function renderUI() {
    document.getElementById('priceUI').innerText = `$${price.toFixed(2)}`;
    if(pos.side) {
      let pnl = (pos.side==='buy' ? price - pos.entry : pos.entry - price) * pos.size;
      const pbox = document.getElementById('pnlUI');
      pbox.innerText = `PNL: $${pnl.toFixed(2)}`;
      pbox.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    }

    Plotly.react('chart', [{
      x: serverHistory.map(c => new Date(c.x)),
      open: serverHistory.map(c => c.open),
      high: serverHistory.map(c => c.high),
      low: serverHistory.map(c => c.low),
      close: serverHistory.map(c => c.close),
      type: 'candlestick', 
      increasing: {line: {color: '#10b981'}}, 
      decreasing: {line: {color: '#f43f5e'}}
    }], {
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', showlegend: false,
      margin: {t: 30, b: 30, l: 50, r: 10}, 
      xaxis: {gridcolor: '#1c1f26', color: '#6b7280', rangeslider: {visible: false}}, 
      yaxis: {gridcolor: '#1c1f26', color: '#6b7280'}
    }, {displayModeBar: false});
  }

  function checkLimitOrders() {
    resting = resting.filter(o => {
      if((o.side==='buy' && price <= o.px) || (o.side==='sell' && price >= o.px)) {
        openPosition(o.side, o.px, o.size);
        return false;
      }
      return true;
    });
    renderResting();
  }

  function openPosition(side, px, size) {
    if(pos.side) return;
    pos = {side, entry: px, size};
    document.getElementById('exitBtn').style.display = 'block';
    socket.emit('executeTrade', { side, price: px, size });
  }

  function manualExit() {
    pos = {side:null, entry:0, size:0};
    document.getElementById('exitBtn').style.display = 'none';
    document.getElementById('pnlUI').innerText = "PNL: $0.00";
  }

  function handleOrder(side) {
    let type = document.getElementById('orderType').value;
    let size = +document.getElementById('lotInput').value;
    if(type==='market') openPosition(side, price, size);
    else {
      resting.push({side, px: +document.getElementById('limitPrice').value, size});
      renderResting();
    }
  }

  function renderResting() {
    let h = '';
    resting.forEach(o => h += `<div class="order-row"><span>${o.side.toUpperCase()}</span><span>$${o.px.toFixed(2)}</span></div>`);
    document.getElementById('pendingList').innerHTML = h;
  }

  function log(m, c='') {
    const l = document.getElementById('logs');
    l.innerHTML = `<div style="color:${c}">[SYSTEM] ${m}</div>` + l.innerHTML;
  }

  window.toggleLimit = () => {
    document.getElementById('limitBox').style.display = document.getElementById('orderType').value === 'limit' ? 'block' : 'none';
  };

  document.getElementById('buyBtn').onclick = () => handleOrder('buy');
  document.getElementById('sellBtn').onclick = () => handleOrder('sell');
</script>
</body>
</html>
