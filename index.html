<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SAMMY SUPREME - SMART INSTITUTIONAL TERMINAL v19</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg: #010204; --panel: #0a0c10; --border: #1c1f26;
    --text: #d1d5db; --accent: #38bdf8; --green: #10b981; --red: #f43f5e; --gold: #fbbf24;
  }
  body, html { margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:var(--text); font-family: 'JetBrains Mono', monospace; overflow:hidden; }
  
  .container { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
  .sidebar { background: var(--panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 20px; gap: 15px; overflow-y: auto; z-index: 10; }
  .chart-area { background: #000; position: relative; display: flex; flex-direction: column; }
  
  /* Sliders Styling */
  .slider-box { margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
  .slider-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: bold; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }

  .tf-bar { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 6px; border: 1px solid var(--border); }
  .tf-btn { background: #161b22; border: 1px solid var(--border); color: var(--text); padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: bold; }
  .tf-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .module { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
  .label { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .val { font-size: 22px; font-weight: 900; }

  #botActivityChart { height: 80px; width: 100%; margin-top: 5px; }
  input[type=number] { background: #000; border: 1px solid var(--border); color: var(--green); padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; margin-bottom: 10px; font-weight: bold; font-size: 16px; outline: none; }
  .btn-wrap { display: flex; gap: 10px; }
  .btn { border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: 900; width: 100%; text-transform: uppercase; transition: 0.2s; }
  .buy { background: var(--green); color: #000; }
  .sell { background: var(--red); color: #fff; }
  .exit { background: #333; color: #fff; margin-top: 10px; width: 100%; display: none; font-weight: 900; border-radius: 8px; padding: 12px; cursor: pointer; border: none; }

  #lockOverlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
  #lockTimer { color: var(--red); font-size: 64px; font-weight: 900; }
  #logs { font-size: 11px; color: #6b7280; flex: 1; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 15px; }
</style>
</head>
<body>

<div id="lockOverlay">
    <div style="color:var(--accent); font-size:14px; letter-spacing:3px;">SYSTEM_LOCKED</div>
    <div id="lockTimer">03:00</div>
    <div style="color:#555;">PENALTY: MARGIN_EXHAUSTED</div>
</div>

<div class="container">
  <aside class="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:900; color:var(--accent); font-size:18px;">SAMMY_v19_SLTP</span>
      <span id="actBots" style="font-size:10px; color:var(--gold); border:1px solid var(--gold); padding:2px 6px; border-radius:3px;">USERS: 1</span>
    </div>

    <div class="module">
      <div class="label">Capital</div>
      <div id="walletUI" class="val" style="color:var(--gold);">$50,000.00</div>
    </div>

    <div class="module">
      <div class="label">Live Price</div>
      <div id="priceUI" class="val" style="font-size:32px; color:#fff;">$100.0000</div>
      <input type="number" id="lotInput" value="50000" step="1000">
      
      <div class="slider-box">
        <div class="slider-header"><span>STOP LOSS (Points)</span><span id="slVal">1.50</span></div>
        <input type="range" id="slSlider" min="0.1" max="10" step="0.1" value="1.5">
        
        <div class="slider-header" style="margin-top:10px;"><span>TAKE PROFIT (Points)</span><span id="tpVal">3.00</span></div>
        <input type="range" id="tpSlider" min="0.1" max="20" step="0.1" value="3.0">
      </div>

      <div class="btn-wrap" style="margin-top:10px;">
        <button class="btn buy" id="buyBtn">PUMP</button>
        <button class="btn sell" id="sellBtn">DUMP</button>
      </div>
      <button class="exit" id="exitBtn" onclick="manualExit()">CLOSE POSITION</button>
      <div id="pnlUI" style="margin-top:15px; font-size:24px; text-align:center; font-weight:900;">PNL: $0.00</div>
    </div>

    <div id="logs"></div>
  </aside>

  <main class="chart-area">
    <div class="tf-bar">
      <button class="tf-btn active" onclick="setTF(1, 's')">1S</button>
      <button class="tf-btn" onclick="setTF(5, 's')">5S</button>
      <button class="tf-btn" onclick="setTF(1, 'm')">1M</button>
      <button class="tf-btn" onclick="setTF(1, 'h')">1H</button>
    </div>
    <div id="chart" style="width:100%; height:100%;"></div>
  </main>
</div>

<script>
  const socket = io("https://sammy-terminal.onrender.com");
  let rawHistory = [], currentTFVal = 1, currentTFUnit = 's';
  let price = 100, wallet = 50000;
  let pos = { side: null, entry: 0, size: 0, sl: 0, tp: 0 }; 
  let userIsDragging = false;

  // Update Slider Labels
  document.getElementById('slSlider').oninput = function() { document.getElementById('slVal').innerText = parseFloat(this.value).toFixed(2); };
  document.getElementById('tpSlider').oninput = function() { document.getElementById('tpVal').innerText = parseFloat(this.value).toFixed(2); };

  socket.on('initData', (data) => { 
    rawHistory = data; 
    if(data.length > 0) price = data[data.length-1].close;
    renderChart(); 
  });

  socket.on('marketUpdate', (data) => {
    price = data.price;
    rawHistory = data.history;
    document.getElementById('priceUI').innerText = `$${price.toFixed(4)}`;
    updatePNL();
    renderChart();
  });

  function updatePNL() {
    const pnlDisplay = document.getElementById('pnlUI');
    const walletDisplay = document.getElementById('walletUI');

    if (pos.side) {
      let diff = pos.side === 'buy' ? price - pos.entry : pos.entry - price;
      let pnl = diff * pos.size;
      
      pnlDisplay.innerText = `PNL: $${pnl.toFixed(2)}`;
      pnlDisplay.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
      walletDisplay.innerText = `$${(wallet + pnl).toFixed(2)}`;

      // --- AUTO SL / TP LOGIC ---
      if (diff <= -pos.sl) {
        logEvent(`STOP LOSS HIT! Price: ${price.toFixed(2)}`, "var(--red)");
        manualExit();
      } else if (diff >= pos.tp) {
        logEvent(`TAKE PROFIT HIT! Price: ${price.toFixed(2)}`, "var(--green)");
        manualExit();
      }
      
      if ((wallet + pnl) <= 0) manualExit();
    } else {
      pnlDisplay.innerText = "PNL: $0.00";
      pnlDisplay.style.color = "var(--text)";
      walletDisplay.innerText = `$${wallet.toFixed(2)}`;
    }
  }

  document.getElementById('buyBtn').onclick = () => {
    if (pos.side) return;
    const size = +document.getElementById('lotInput').value;
    const slPoints = +document.getElementById('slSlider').value;
    const tpPoints = +document.getElementById('tpSlider').value;
    
    pos = { side: 'buy', entry: price, size: size, sl: slPoints, tp: tpPoints };
    document.getElementById('exitBtn').style.display = 'block';
    socket.emit('executeTrade', { side: 'buy', size: size });
    logEvent(`LONG ENTERED @ ${price.toFixed(2)} (SL: ${slPoints}, TP: ${tpPoints})`, "var(--accent)");
  };

  document.getElementById('sellBtn').onclick = () => {
    if (pos.side) return;
    const size = +document.getElementById('lotInput').value;
    const slPoints = +document.getElementById('slSlider').value;
    const tpPoints = +document.getElementById('tpSlider').value;

    pos = { side: 'sell', entry: price, size: size, sl: slPoints, tp: tpPoints };
    document.getElementById('exitBtn').style.display = 'block';
    socket.emit('executeTrade', { side: 'sell', size: size });
    logEvent(`SHORT ENTERED @ ${price.toFixed(2)} (SL: ${slPoints}, TP: ${tpPoints})`, "var(--red)");
  };

  function manualExit() {
    if (pos.side) {
      let pnl = (pos.side === 'buy' ? price - pos.entry : pos.entry - price) * pos.size;
      wallet += pnl;
      socket.emit('updateBalance', wallet);
    }
    pos = { side: null, entry: 0, size: 0, sl: 0, tp: 0 };
    document.getElementById('exitBtn').style.display = 'none';
    updatePNL();
  }

  function logEvent(msg, color) {
    const l = document.getElementById('logs');
    l.innerHTML = `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
  }

  // --- CHART (STAYS SAME) ---
  function setTF(val, unit) {
    currentTFVal = val; currentTFUnit = unit;
    userIsDragging = false;
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderChart();
  }

  function aggregateData() {
    let interval = currentTFUnit === 's' ? currentTFVal * 1000 : currentTFVal * 60000;
    let groups = {};
    rawHistory.forEach(p => {
      let t = Math.floor(p.x / interval) * interval;
      if (!groups[t]) groups[t] = { x: t, open: p.open, high: p.high, low: p.low, close: p.close };
      else {
        groups[t].high = Math.max(groups[t].high, p.high);
        groups[t].low = Math.min(groups[t].low, p.low);
        groups[t].close = p.close;
      }
    });
    return Object.values(groups).sort((a,b) => a.x - b.x);
  }

  function renderChart() {
    const d = aggregateData();
    if(d.length === 0) return;
    const times = d.map(c => new Date(c.x));
    const layout = {
      paper_bgcolor:'#000', plot_bgcolor:'#000', showlegend:false, margin:{t:10,b:30,l:10,r:50},
      xaxis:{ gridcolor:'#1c1f26', color:'#6b7280', rangeslider:{visible:false}, type:'date', autorange: !userIsDragging },
      yaxis:{ gridcolor:'#1c1f26', color:'#6b7280', side:'right' }, dragmode: 'pan'
    };
    if (!userIsDragging && d.length > 20) layout.xaxis.range = [times[d.length - 21], times[times.length - 1]];
    Plotly.react('chart', [{
      x: times, open: d.map(c => c.open), high: d.map(c => c.high), low: d.map(c => c.low), close: d.map(c => c.close),
      type: 'candlestick', increasing: {line:{color:'#10b981'}}, decreasing: {line:{color:'#f43f5e'}}
    }], layout, {displayModeBar: false, scrollZoom: true});
  }
</script>
</body>
</html>
